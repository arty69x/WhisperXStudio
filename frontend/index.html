<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WhisperX Studio Omega</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..900;1,9..40,400..900&family=JetBrains+Mono:ital,wght@0,400..800;1,400..800&family=Syne:wght@400..800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            bg: '#010105',
            panel: '#0c0c2d',
            rose: '#ff0055',
            violet: '#7000ff',
            emerald: '#00f5a0',
            amber: '#ffcc00',
            cyan: '#00d4ff',
          },
          animation: {
            'spin-slow': 'spin 8s linear infinite',
            'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            pulseGlow: {
              '0%, 100%': { opacity: 1, filter: 'brightness(1)' },
              '50%': { opacity: .8, filter: 'brightness(1.5)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Global Styles -->
  <style>
    body {
      background-color: #010105;
      color: #f0f2f5;
      margin: 0;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(112,0,255,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(112,0,255,0.6); }
    
    /* Selection */
    ::selection { background: rgba(112,0,255,0.4); color: #fff; }
    
    /* Utilities */
    .glass-panel {
      background: rgba(12, 12, 45, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .holo-text {
      background: linear-gradient(135deg, #ff0055, #7000ff, #00f5a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Canvas Grid Background */
    .canvas-bg {
      background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>

  <!-- Import Map -->
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
